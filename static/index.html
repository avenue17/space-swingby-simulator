<!-- static/index.html - 3D 태양계 스윙바이 시뮬레이터의 화면 구조와 UI 요소 정의 -->

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Solar Swingby Simulator</title>
    <link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
<div id="app">
    <div id="intro-screen">
        <div class="intro-card">
            <div class="intro-badge">3D Gravity Simulator</div>
            <h1>Solar Swingby Simulator</h1>
            <p>
                행성의 중력을 이용해 우주선의 궤적과 속도 변화를 관찰하는
                3D 스윙바이 시뮬레이터입니다.
            </p>

            <div class="intro-actions">
                <button id="start-simulator">시뮬레이터 시작</button>
                <button id="intro-skip">바로 조작하기</button>
            </div>

            <div class="intro-hint">
                행성을 클릭하면 질량과 반지름을 조정할 수 있습니다.
            </div>
        </div>
    </div>

    <div id="viewport"></div>

    <button id="toggle-left" class="panel-toggle left-toggle">☰</button>
    <button id="toggle-right" class="panel-toggle right-toggle">☷</button>

    <div id="left-panel">
        <div class="panel-title">
            <div>
                <h1>Solar Swingby</h1>
                <p>Launch & Planet Control</p>
            </div>
        </div>

        <section>
            <h2>Launch</h2>

            <label>
                수평 발사각
                <span><span id="angle-value">25.0</span>°</span>
            </label>
            <input id="angle" type="range" min="0" max="360" value="25" step="0.1" data-key-step="0.1">

            <label>
                수직 발사각
                <span><span id="vertical-angle-value">0.0</span>°</span>
            </label>
            <input id="vertical-angle" type="range" min="-90" max="90" value="0" step="0.1" data-key-step="0.1">

            <label>
                초기 속도
                <span id="speed-value">18.0</span>
            </label>
            <input id="speed" type="range" min="1" max="80" value="18" step="0.1" data-key-step="0.1">

            <label>
                출발 시각
                <span id="time-value">0.0</span>
            </label>
            <input id="start-time" type="range" min="0" max="900" value="0" step="0.1" data-key-step="0.1">

            <div class="compact-grid">
                <div>
                    <label>태양계 모드</label>
                    <select id="system-mode">
                        <option value="custom">Custom</option>
                        <option value="real">Real Scaled</option>
                    </select>
                </div>

                <div>
                    <label>기준 날짜</label>
                    <input id="date-input" type="date" value="2026-05-20">
                </div>
            </div>

            <div class="button-row wide primary-actions">
                <button id="launch">발사</button>
                <button id="play">재생</button>
                <button id="pause">멈춤</button>
                <button id="reset-flight">초기화</button>
            </div>
        </section>

        <section>
            <h2>Planet</h2>

            <div id="selected-planet">선택된 행성: Earth</div>

            <label>
                질량 배율
                <span id="mass-value">1.00</span>
            </label>
            <input id="mass-scale" type="range" min="0.1" max="5" value="1" step="0.01" data-key-step="0.01">

            <label>
                반지름 배율
                <span id="radius-value">1.00</span>
            </label>
            <input id="radius-scale" type="range" min="0.5" max="3" value="1" step="0.01" data-key-step="0.01">

            <div class="button-row wide">
                <button id="save-planet">Save</button>
                <button id="reset-planets">Reset Solar System</button>
            </div>
        </section>
    </div>

    <div id="right-panel">
        <div class="panel-title small">
            <div>
                <h1>Flight Data</h1>
                <p>Speed, status, and trajectory summary</p>
            </div>
        </div>

        <div class="button-row control-actions">
            <button id="speed-05x">0.5x</button>
            <button id="speed-1x">1x</button>
            <button id="speed-2x">2x</button>
            <button id="speed-5x">5x</button>
            <button id="camera-lock">시점 고정 OFF</button>
            <button id="back-1">1초 전</button>
            <button id="back-5">5초 전</button>
        </div>

        <div id="info">loading...</div>
        <canvas id="speed-chart"></canvas>
    </div>

    <div id="chart-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <span>Speed Graph</span>
                <button id="close-chart">닫기</button>
            </div>
            <canvas id="big-speed-chart"></canvas>
        </div>
    </div>
</div>

<script>
    const introScreen = document.getElementById("intro-screen");
    const startSimulator = document.getElementById("start-simulator");
    const introSkip = document.getElementById("intro-skip");

    function closeIntro() {
        introScreen.classList.add("hidden");
    }

    startSimulator.addEventListener("click", closeIntro);
    introSkip.addEventListener("click", closeIntro);
</script>

<script type="module" src="/static/main.js?v=58"></script>
</body>
</html>
