<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Solar Swingby Simulator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
    <div id="viewport"></div>

    <button id="toggle-left" class="panel-toggle left-toggle">☰</button>
    <button id="toggle-right" class="panel-toggle right-toggle">☷</button>

    <div id="left-panel">
        <h1>Solar Swingby Simulator</h1>

        <section>
            <h2>우주선 설정</h2>

            <label>발사각 <span id="angle-value">25</span>°</label>
            <input id="angle" type="range" min="0" max="360" value="25" step="1">

            <label>초기 속도 <span id="speed-value">18</span></label>
            <input id="speed" type="range" min="1" max="80" value="18" step="0.5">

            <label>출발 시각 <span id="time-value">0</span></label>
            <input id="start-time" type="range" min="0" max="900" value="0" step="1">

            <label>태양계 모드</label>
            <select id="system-mode">
                <option value="custom">Custom Solar System</option>
                <option value="real">Real Scaled Solar System</option>
            </select>

            <label>기준 날짜</label>
            <input id="date-input" type="date" value="2026-05-20">

            <div class="button-row wide">
                <button id="launch">발사</button>
                <button id="play">재생</button>
                <button id="pause">멈춤</button>
                <button id="reset-flight">비행 초기화</button>
            </div>
        </section>

        <section>
            <h2>행성 설정</h2>

            <div id="selected-planet">선택된 행성: Earth</div>

            <label>질량 배율 <span id="mass-value">1.0</span></label>
            <input id="mass-scale" type="range" min="0.1" max="5" value="1" step="0.1">

            <label>반지름 배율 <span id="radius-value">1.0</span></label>
            <input id="radius-scale" type="range" min="0.5" max="3" value="1" step="0.1">

            <div class="button-row wide">
                <button id="save-planet">Save</button>
                <button id="reset-planets">태양계 초기화</button>
            </div>
        </section>
    </div>

    <div id="right-panel">
        <div class="button-row">
            <button id="speed-05x">0.5x</button>
            <button id="speed-1x">1x</button>
            <button id="speed-2x">2x</button>
            <button id="speed-5x">5x</button>
            <button id="camera-lock">시점 고정 OFF</button>
            <button id="back-1">1초 전</button>
            <button id="back-5">5초 전</button>
        </div>

        <div id="info">loading...</div>
        <canvas id="speed-chart"></canvas>
    </div>

    <div id="chart-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <span>Speed Graph</span>
                <button id="close-chart">닫기</button>
            </div>
            <canvas id="big-speed-chart"></canvas>
        </div>
    </div>
</div>

<script type="module" src="/static/main.js?v=50"></script>
</body>
</html>
